config:
  target: "http://localhost:3000"
  variables:
    token: "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjZhMTQ2ZjJmY2Y5YmJmZjJlYTI4YmMzNyIsInJvbGUiOiJzdHVkZW50IiwiaWF0IjoxNzc5NzY0Mzc2LCJleHAiOjE3Nzk4NTA3NzZ9.4waWlPLTODs0cyZAuH5ZGSmcJ5P5redXPJreJl767ic"
    chatId: "6a150e5290b1267befd65d3d" 
  phases:
    - duration: 30
      arrivalRate: 2
      name: "Fase 1: Calentamiento"
    - duration: 60
      arrivalRate: 2
      rampTo: 25
      name: "Fase 2: Escalamiento"
    - duration: 30
      arrivalRate: 40
      name: "Fase 3: Pico de estrés masivo"
scenarios:
  - name: "Enviar mensaje y eliminarlo para todos"
    flow:
      - post:
          url: "/api/chat/message" 
          headers:
            Authorization: "{{ token }}"
          json:
            chatId: "{{ chatId }}"
            content: "Mensaje de carga desde Artillery"
          capture:
            - json: "$.message._id"
              as: "messageId"
          expect:
            - statusCode: 201
      - delete:
          url: "/api/chat/message/{{ messageId }}"
          headers:
            Authorization: "{{ token }}"
          json:
            type: "for_all"
          expect:
            - statusCode: 200