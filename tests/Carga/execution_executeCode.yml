config:
  target: "http://localhost:3000"
  phases:
    - duration: 30
      arrivalRate: 2
      name: "Fase 1: Calentamiento"
    - duration: 60
      arrivalRate: 2
      rampTo: 20
      name: "Fase 2: Escalamiento (Menos agresivo por los Child Process)"
    - duration: 30
      arrivalRate: 40
      name: "Fase 3: Pico de estrés masivo"
scenarios:
  - name: "Compilación de código JavaScript rápido"
    flow:
      - post:
          url: "/api/execution/run" # Ajustar a tu ruta real
          json:
            language: "javascript"
            code: "console.log('Test de carga exitoso');"